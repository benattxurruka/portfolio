name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI ───────────────────────────────────────────────────────────────────────
  # Runs on every push and PR. Fails fast so broken PRs never reach deploy.
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # ── Sentry ────────────────────────────────────────────────────────
          SENTRY_AUTH_TOKEN:        ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:               ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT:           ${{ secrets.SENTRY_PROJECT }}
          NEXT_PUBLIC_SENTRY_DSN:   ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          # ── R2 (public URL must be NEXT_PUBLIC_ so the client can use it) ─
          NEXT_PUBLIC_R2_PUBLIC_URL: ${{ vars.NEXT_PUBLIC_R2_PUBLIC_URL }}
          R2_PUBLIC_HOSTNAME:       ${{ vars.R2_PUBLIC_HOSTNAME }}
          # ── GitHub feed ───────────────────────────────────────────────────
          GITHUB_USERNAME:          ${{ vars.GITHUB_USERNAME }}
        run: npm run build

  # ── Deploy ───────────────────────────────────────────────────────────────────
  # Only runs on pushes to main (not PRs) and only if CI passes.
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:       "--prod"
