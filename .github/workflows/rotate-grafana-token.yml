name: Rotate Grafana OTLP Token

# Runs on the 1st of every month at 09:00 UTC.
# Can also be triggered manually from the Actions tab.
#
# HOW THE GRAFANA OTLP TOKEN WORKS
# ----------------------------------
# The OTLP gateway authenticates via HTTP Basic Auth:
#   username: Grafana Cloud instance/stack ID  (numeric)
#   password: a Cloud Access Policy token with metrics/logs/traces write scopes
#
# Vercel stores the raw "instanceId:cloudAccessPolicyToken" string.
# The code in instrumentation.ts base64-encodes it for the Authorization header.
#
# This workflow:
#   1. Creates a new token under the existing Cloud Access Policy via the
#      Grafana Cloud API (grafana.com/api), authenticated with a Cloud API key.
#   2. Stores "{instanceId}:{newToken}" in Vercel as GRAFANA_OTLP_TOKEN.
#   3. Triggers a production redeploy.
#   4. Deletes all tokens in that policy older than 40 days.
#
# Required secrets (GitHub Actions environment: production):
#   GRAFANA_ADMIN_TOKEN           — Token from a Cloud Access Policy with
#                                   accesspolicies:read + accesspolicies:write scopes
#                                   (grafana.com → Security → Access Policies)
#   GRAFANA_CLOUD_ACCESS_POLICY_ID — ID of the OTLP Cloud Access Policy (numeric,
#                                   visible in the URL when editing the policy)
#   GRAFANA_INSTANCE_ID           — Numeric stack/instance ID from grafana.com
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  rotate:
    name: Rotate Grafana OTLP token
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      actions: write

    steps:
      - name: Create new Cloud Access Policy token
        id: grafana
        env:
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_ADMIN_TOKEN }}
          POLICY_ID:       ${{ secrets.GRAFANA_CLOUD_ACCESS_POLICY_ID }}
        run: |
          REGION="prod-eu-west-0"
          BASE="https://www.grafana.com/api/v1/accesspolicies/${POLICY_ID}/tokens?region=${REGION}"
          AUTH="Authorization: Bearer ${GRAFANA_API_KEY}"
          TOKEN_NAME="otlp-rotating"

          # ── Delete old rotating tokens ────────────────────────────────────
          HTTP_RESP=$(curl -s -w "\n%{http_code}" "${BASE}" -H "$AUTH")
          HTTP_CODE=$(echo "$HTTP_RESP" | tail -1)
          TOKENS=$(echo "$HTTP_RESP" | head -n -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: GET ${BASE} returned HTTP ${HTTP_CODE}"
            echo "Response body: $TOKENS"
            echo "Check GRAFANA_ADMIN_TOKEN and GRAFANA_CLOUD_ACCESS_POLICY_ID."
            exit 1
          fi

          CUTOFF=$(date -d '40 days ago' +%s 2>/dev/null || date -v-40d +%s)

          echo "$TOKENS" | jq -r --arg name "$TOKEN_NAME" --argjson cutoff "$CUTOFF" \
            '.items[] | select(.name == $name) |
             select(.createdAt | if . then (gsub("\\.[0-9]+Z$";"Z") | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime) else 0 end < $cutoff) |
             .id' | while read -r id; do
            curl -sf -X DELETE "https://www.grafana.com/api/v1/accesspolicies/${POLICY_ID}/tokens/${id}?region=${REGION}" \
              -H "$AUTH" \
              || echo "WARNING: failed to delete token id=${id} (continuing)"
            echo "Deleted old token id=${id}"
          done

          # ── Create a new token (expires in 40 days) ───────────────────────
          EXPIRY=$(date -u -d '40 days' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
            || date -u -v+40d '+%Y-%m-%dT%H:%M:%SZ')

          RESPONSE=$(curl -sf -X POST "${BASE}" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d "{\"name\": \"${TOKEN_NAME}\", \"expiresAt\": \"${EXPIRY}\"}") \
            || { echo "ERROR: Failed to create Cloud Access Policy token: $RESPONSE"; exit 1; }

          NEW_TOKEN=$(echo "$RESPONSE" | jq -r '.token')
          if [ -z "$NEW_TOKEN" ] || [ "$NEW_TOKEN" = "null" ]; then
            echo "ERROR: unexpected response from Grafana Cloud API"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          echo "::add-mask::$NEW_TOKEN"
          echo "TOKEN=$NEW_TOKEN" >> "$GITHUB_OUTPUT"
          echo "New Cloud Access Policy token created"

      - name: Store OTLP token in Vercel
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID:    ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          INSTANCE_ID:       ${{ secrets.GRAFANA_INSTANCE_ID }}
          NEW_TOKEN:         ${{ steps.grafana.outputs.TOKEN }}
        run: |
          OTLP_TOKEN="${INSTANCE_ID}:${NEW_TOKEN}"
          echo "::add-mask::$OTLP_TOKEN"

          BASE="https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env"
          AUTH="Authorization: Bearer ${VERCEL_TOKEN}"

          EXISTING_ID=$(curl -sf "${BASE}?teamId=${VERCEL_TEAM_ID}" -H "$AUTH" \
            | jq -r '.envs[] | select(.key == "GRAFANA_OTLP_TOKEN" and (.target | contains(["production"]))) | .id // empty' \
            | head -1)

          if [ -n "$EXISTING_ID" ]; then
            RESP=$(curl -sf -X PATCH "${BASE}/${EXISTING_ID}?teamId=${VERCEL_TEAM_ID}" \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"value\": \"$OTLP_TOKEN\"}" 2>&1) \
              || { echo "ERROR: PATCH failed: $RESP"; exit 1; }
            echo "Updated GRAFANA_OTLP_TOKEN in Vercel (production)"
          else
            RESP=$(curl -sf -X POST "${BASE}?teamId=${VERCEL_TEAM_ID}" \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d "{
                \"key\":    \"GRAFANA_OTLP_TOKEN\",
                \"value\":  \"$OTLP_TOKEN\",
                \"type\":   \"sensitive\",
                \"target\": [\"production\"]
              }" 2>&1) \
              || { echo "ERROR: POST failed: $RESP"; exit 1; }
            echo "Created GRAFANA_OTLP_TOKEN in Vercel (production)"
          fi

      - name: Trigger production redeploy
        run: |
          RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref": "main"}' 2>&1) \
            || { echo "ERROR: dispatch failed: $RESP"; exit 1; }
          echo "Deploy workflow dispatched on main"
