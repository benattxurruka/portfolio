name: Terraform — Grafana Dashboards

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: terraform

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      pull-requests: write   # needed to post the plan as a PR comment

    outputs:
      plan-exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: terraform init

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate
        run: terraform validate

      - name: Plan
        id: plan
        env:
          TF_VAR_grafana_url:                    ${{ secrets.GRAFANA_URL }}
          TF_VAR_grafana_service_account_token:  ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_prometheus_datasource_uid:      ${{ vars.GRAFANA_PROMETHEUS_DS_UID }}
          TF_VAR_loki_datasource_uid:            ${{ vars.GRAFANA_LOKI_DS_UID }}
          TF_VAR_tempo_datasource_uid:           ${{ vars.GRAFANA_TEMPO_DS_UID }}
        # -detailed-exitcode: 0=no changes, 1=error, 2=changes pending
        run: terraform plan -no-color -detailed-exitcode -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_STDERR: ${{ steps.plan.outputs.stderr }}
          PLAN_EXITCODE: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const exitcode = process.env.PLAN_EXITCODE;
            const status   = exitcode === '0' ? '✅ No changes'
                           : exitcode === '2' ? '🔄 Changes pending'
                           :                   '❌ Plan failed';
            const body = [
              `#### Terraform Plan — ${status}`,
              '```terraform',
              process.env.PLAN_STDOUT || process.env.PLAN_STDERR || '(no output)',
              '```',
              `*Triggered by @${{ github.actor }} on \`${{ github.event_name }}\`*`,
            ].join('\n');

            // Update existing bot comment if present, otherwise create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      # Persist the plan file so the apply job can use it without re-running plan
      - name: Upload plan
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    # Only apply on main pushes when there are actual changes (exitcode=2)
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      needs.plan.outputs.plan-exitcode == '2'

    environment:
      name: production   # requires manual approval if configured in repo settings

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: terraform init

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Apply
        env:
          TF_VAR_grafana_url:                    ${{ secrets.GRAFANA_URL }}
          TF_VAR_grafana_service_account_token:  ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
          TF_VAR_prometheus_datasource_uid:      ${{ vars.GRAFANA_PROMETHEUS_DS_UID }}
          TF_VAR_loki_datasource_uid:            ${{ vars.GRAFANA_LOKI_DS_UID }}
          TF_VAR_tempo_datasource_uid:           ${{ vars.GRAFANA_TEMPO_DS_UID }}
        run: terraform apply -auto-approve tfplan
