name: Rotate GitHub App Private Key

# Runs on 1 January at 08:00 UTC (annual rotation) and can be triggered manually.
#
# HOW IT WORKS
# ------------
# GitHub App private keys are rotated via the GitHub API (POST /app/keys).
# GitHub generates the new RSA key pair and returns the private key PEM.
# This avoids the need to upload custom public keys through the UI.
#
# The current private key is stored in TWO places that must stay in sync:
#   • Vercel env var GH_APP_PRIVATE_KEY  — used by the running app
#   • GitHub Actions secret GH_APP_PRIVATE_KEY (environment: production)
#                                         — used by this rotation workflow
#
# Vercel sensitive env vars cannot be decrypted via the API with standard tokens,
# so this workflow reads the key from the GitHub Actions secret instead.
#
# Steps:
#   1. Write secrets.GH_APP_PRIVATE_KEY → /tmp/current-key.pem.
#   2. Authenticate as the GitHub App and call POST /app/keys → new private key.
#      Written to /tmp/new-key.pem.
#   3. Store the new private key in Vercel as GH_APP_PRIVATE_KEY.
#   4. Update the GitHub Actions environment secret GH_APP_PRIVATE_KEY.
#   5. Trigger a production redeploy.
#   6. Delete old keys from the GitHub App settings page manually if needed:
#      github.com/settings/apps/[app-slug] → Private keys → revoke old ones.
#
# Required secrets (GitHub Actions environment: production):
#   GH_APP_PRIVATE_KEY    — current GitHub App private key PEM
#   GH_CLIENT_ID          — GitHub App client ID (Iv23li... string, shown in App settings)
#   GH_PAT                — classic PAT (or fine-grained PAT with "Secrets: Read/write")
#                           needed to update the GH_APP_PRIVATE_KEY secret after rotation;
#                           github.token does not have permission to write environment secrets
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

on:
  schedule:
    - cron: '0 8 1 1 *'   # 1 January at 08:00 UTC
  workflow_dispatch:

jobs:
  rotate:
    name: Rotate GitHub App private key
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      actions: write   # dispatch the deploy workflow

    steps:
      - name: Write current private key to file
        env:
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$GH_APP_PRIVATE_KEY" > /tmp/current-key.pem
          head -1 /tmp/current-key.pem   # should print: -----BEGIN RSA PRIVATE KEY-----

      - name: Create new key via GitHub App API
        id: newkey
        env:
          CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
        run: |
          NEW_KEY_JSON=$(node --input-type=module <<'EOF'
            import crypto from 'crypto';
            import https from 'https';
            import fs from 'fs';

            const clientId = process.env.CLIENT_ID;
            const key      = crypto.createPrivateKey(fs.readFileSync('/tmp/current-key.pem'));

            function makeJWT() {
              const now     = Math.floor(Date.now() / 1000);
              const header  = Buffer.from(JSON.stringify({ alg: 'RS256', typ: 'JWT' })).toString('base64url');
              const payload = Buffer.from(JSON.stringify({ iat: now - 60, exp: now + 540, iss: clientId })).toString('base64url');
              const body    = `${header}.${payload}`;
              const sig     = crypto.sign('sha256', Buffer.from(body), { key, padding: crypto.constants.RSA_PKCS1_PADDING }).toString('base64url');
              return `${body}.${sig}`;
            }

            // Verify JWT auth before attempting key creation
            await new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.github.com', path: '/app', method: 'GET',
                headers: {
                  Authorization: `Bearer ${makeJWT()}`,
                  Accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent': 'portfolio-key-rotation',
                },
              }, res => {
                let body = '';
                res.on('data', c => body += c);
                res.on('end', () => {
                  if (res.statusCode !== 200) {
                    reject(new Error(`JWT auth check failed — GET /app returned ${res.statusCode}: ${body}\nCheck that GH_APP_PRIVATE_KEY secret matches the key registered on the GitHub App.`));
                  } else {
                    const app = JSON.parse(body);
                    console.log(`JWT auth OK — app: ${app.slug}`);
                    resolve();
                  }
                });
              });
              req.on('error', reject);
              req.end();
            });

            const data = await new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.github.com',
                path:     '/app/keys',
                method:   'POST',
                headers:  {
                  Authorization:          `Bearer ${makeJWT()}`,
                  Accept:                 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent':           'portfolio-key-rotation',
                  'Content-Length':       0,
                },
              }, res => {
                let body = '';
                res.on('data', c => body += c);
                res.on('end', () => {
                  if (res.statusCode !== 201) {
                    reject(new Error(`GitHub API ${res.statusCode}: ${body}`));
                  } else {
                    resolve(body);
                  }
                });
              });
              req.on('error', reject);
              req.end();
            });

            process.stdout.write(data);
          EOF
          )

          NEW_KEY_ID=$(echo "$NEW_KEY_JSON" | jq -r '.id')
          NEW_PRIVATE_KEY=$(echo "$NEW_KEY_JSON" | jq -r '.key')

          if [ -z "$NEW_KEY_ID" ] || [ "$NEW_KEY_ID" = "null" ]; then
            echo "ERROR: Failed to create new GitHub App key"
            exit 1
          fi

          # Write new key to temp file — avoids multi-line YAML expression issues
          echo "$NEW_PRIVATE_KEY" > /tmp/new-key.pem

          echo "NEW_KEY_ID=$NEW_KEY_ID" >> "$GITHUB_OUTPUT"
          echo "Created new GitHub App key id=${NEW_KEY_ID}"

      - name: Store new private key in Vercel
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID:    ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          BASE="https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env"
          AUTH="Authorization: Bearer ${VERCEL_TOKEN}"
          ENCODED_KEY=$(jq -Rs . < /tmp/new-key.pem)

          # Look up the env var ID (no decryption needed — just the metadata)
          KEY_ENV_ID=$(curl -sf "${BASE}?teamId=${VERCEL_TEAM_ID}" -H "$AUTH" \
            | jq -r '.envs[] | select(.key == "GH_APP_PRIVATE_KEY" and (.target | contains(["production"]))) | .id // empty' \
            | head -1) \
            || { echo "ERROR: Failed to list Vercel env vars"; exit 1; }

          if [ -n "$KEY_ENV_ID" ]; then
            RESP=$(curl -sf -X PATCH "${BASE}/${KEY_ENV_ID}?teamId=${VERCEL_TEAM_ID}" \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d "{\"value\": ${ENCODED_KEY}}" 2>&1) \
              || { echo "ERROR: PATCH failed: $RESP"; exit 1; }
            echo "Updated GH_APP_PRIVATE_KEY in Vercel (production)"
          else
            RESP=$(curl -sf -X POST "${BASE}?teamId=${VERCEL_TEAM_ID}" \
              -H "$AUTH" -H "Content-Type: application/json" \
              -d "{
                \"key\":    \"GH_APP_PRIVATE_KEY\",
                \"value\":  ${ENCODED_KEY},
                \"type\":   \"sensitive\",
                \"target\": [\"production\"]
              }" 2>&1) \
              || { echo "ERROR: POST failed: $RESP"; exit 1; }
            echo "Created GH_APP_PRIVATE_KEY in Vercel (production)"
          fi

      - name: Update GitHub Actions environment secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set GH_APP_PRIVATE_KEY \
            --env production \
            --repo "${{ github.repository }}" \
            < /tmp/new-key.pem
          echo "Updated GH_APP_PRIVATE_KEY GitHub Actions secret"

      - name: Trigger production redeploy
        run: |
          RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref": "main"}' 2>&1) \
            || { echo "ERROR: dispatch failed: $RESP"; exit 1; }
          echo "Deploy workflow dispatched on main"

      - name: Clean up old keys
        run: |
          echo "Rotation complete. Delete any old private keys manually if needed:"
          echo "github.com/settings/apps/${{ github.repository_owner }}/portfolio-benat → Private keys"
