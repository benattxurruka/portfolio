name: Rotate GitHub App Private Key

# Runs on 1 January at 08:00 UTC (annual rotation) and can be triggered manually.
#
# HOW IT WORKS
# ------------
# GitHub App private keys are rotated via the GitHub API (POST /app/keys).
# GitHub generates the new RSA key pair and returns the private key PEM.
# This avoids the need to upload custom public keys through the UI.
#
# Steps:
#   1. Fetch the current GH_APP_PRIVATE_KEY from Vercel (to sign the App JWT).
#   2. Authenticate as the GitHub App and call POST /app/keys → new private key.
#   3. Store the new private key in Vercel as GH_APP_PRIVATE_KEY.
#   4. Trigger a production redeploy.
#   5. Delete all old keys from the GitHub App (only the new one remains).
#
# Required secrets (GitHub Actions environment: production):
#   GH_APP_ID             — numeric GitHub App ID (same as the Vercel env var)
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

on:
  schedule:
    - cron: '0 8 1 1 *'   # 1 January at 08:00 UTC
  workflow_dispatch:

jobs:
  rotate:
    name: Rotate GitHub App private key
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      actions: write   # dispatch the deploy workflow

    steps:
      - name: Fetch current private key from Vercel
        id: fetch
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID:    ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          BASE="https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env"
          AUTH="Authorization: Bearer ${VERCEL_TOKEN}"

          ENVS=$(curl -sf "${BASE}?teamId=${VERCEL_TEAM_ID}" -H "$AUTH") \
            || { echo "ERROR: Failed to list Vercel env vars"; exit 1; }

          KEY_ENV_ID=$(echo "$ENVS" \
            | jq -r '.envs[] | select(.key == "GH_APP_PRIVATE_KEY" and (.target | contains(["production"]))) | .id // empty' \
            | head -1)

          if [ -z "$KEY_ENV_ID" ]; then
            echo "ERROR: GH_APP_PRIVATE_KEY not found in Vercel. Set it up manually first."
            exit 1
          fi

          CURRENT_KEY=$(curl -sf "${BASE}/${KEY_ENV_ID}?teamId=${VERCEL_TEAM_ID}&decrypt=true" \
            -H "$AUTH" | jq -r '.value') \
            || { echo "ERROR: Failed to decrypt GH_APP_PRIVATE_KEY"; exit 1; }

          echo "::add-mask::$CURRENT_KEY"
          {
            echo "KEY_ENV_ID=$KEY_ENV_ID"
            echo "CURRENT_KEY<<__EOF__"
            echo "$CURRENT_KEY"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "Fetched current private key from Vercel"

      - name: Create new key via GitHub App API
        id: newkey
        env:
          APP_ID:      ${{ secrets.GH_APP_ID }}
          PRIVATE_KEY: ${{ steps.fetch.outputs.CURRENT_KEY }}
        run: |
          # Use Node.js (available on all GitHub runners) to sign the JWT and
          # call the GitHub API — cleaner than doing base64url encoding in bash.
          NEW_KEY_JSON=$(node --input-type=module <<'EOF'
            import crypto from 'crypto';
            import https from 'https';

            const appId = process.env.APP_ID;
            const pem   = process.env.PRIVATE_KEY
              .replace(/\\r\\n/g, '\n')
              .replace(/\\n/g, '\n')
              .trim();

            const now     = Math.floor(Date.now() / 1000);
            const header  = Buffer.from(JSON.stringify({ alg: 'RS256', typ: 'JWT' })).toString('base64url');
            const payload = Buffer.from(JSON.stringify({ iat: now - 60, exp: now + 600, iss: appId })).toString('base64url');
            const body    = `${header}.${payload}`;
            const sig     = crypto.createSign('RSA-SHA256').update(body).sign(pem, 'base64url');
            const jwt     = `${body}.${sig}`;

            const data = await new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'api.github.com',
                path:     '/app/keys',
                method:   'POST',
                headers:  {
                  Authorization:          `Bearer ${jwt}`,
                  Accept:                 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent':           'portfolio-key-rotation',
                  'Content-Length':       0,
                },
              }, res => {
                let body = '';
                res.on('data', c => body += c);
                res.on('end', () => {
                  if (res.statusCode !== 201) {
                    reject(new Error(`GitHub API ${res.statusCode}: ${body}`));
                  } else {
                    resolve(body);
                  }
                });
              });
              req.on('error', reject);
              req.end();
            });

            process.stdout.write(data);
          EOF
          )

          NEW_KEY_ID=$(echo "$NEW_KEY_JSON" | jq -r '.id')
          NEW_PRIVATE_KEY=$(echo "$NEW_KEY_JSON" | jq -r '.key')

          if [ -z "$NEW_KEY_ID" ] || [ "$NEW_KEY_ID" = "null" ]; then
            echo "ERROR: Failed to create new GitHub App key"
            exit 1
          fi

          echo "::add-mask::$NEW_PRIVATE_KEY"
          {
            echo "NEW_KEY_ID=$NEW_KEY_ID"
            echo "NEW_PRIVATE_KEY<<__EOF__"
            echo "$NEW_PRIVATE_KEY"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "Created new GitHub App key id=${NEW_KEY_ID}"

      - name: Store new private key in Vercel
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID:    ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEW_PRIVATE_KEY:   ${{ steps.newkey.outputs.NEW_PRIVATE_KEY }}
          KEY_ENV_ID:        ${{ steps.fetch.outputs.KEY_ENV_ID }}
        run: |
          BASE="https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env"
          AUTH="Authorization: Bearer ${VERCEL_TOKEN}"
          ENCODED_KEY=$(echo "$NEW_PRIVATE_KEY" | jq -Rs .)

          RESP=$(curl -sf -X PATCH "${BASE}/${KEY_ENV_ID}?teamId=${VERCEL_TEAM_ID}" \
            -H "$AUTH" -H "Content-Type: application/json" \
            -d "{\"value\": ${ENCODED_KEY}}" 2>&1) \
            || { echo "ERROR: PATCH failed: $RESP"; exit 1; }
          echo "Updated GH_APP_PRIVATE_KEY in Vercel (production)"

      - name: Trigger production redeploy
        run: |
          RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d '{"ref": "main"}' 2>&1) \
            || { echo "ERROR: dispatch failed: $RESP"; exit 1; }
          echo "Deploy workflow dispatched on main"

      - name: Delete old keys from GitHub App
        env:
          APP_ID:      ${{ secrets.GH_APP_ID }}
          PRIVATE_KEY: ${{ steps.newkey.outputs.NEW_PRIVATE_KEY }}
          KEEP_KEY_ID: ${{ steps.newkey.outputs.NEW_KEY_ID }}
        run: |
          # Authenticate with the NEW key to list and delete all other keys.
          node --input-type=module <<'EOF'
            import crypto from 'crypto';
            import https from 'https';

            const appId   = process.env.APP_ID;
            const keepId  = Number(process.env.KEEP_KEY_ID);
            const pem     = process.env.PRIVATE_KEY
              .replace(/\\r\\n/g, '\n')
              .replace(/\\n/g, '\n')
              .trim();

            function makeJWT() {
              const now     = Math.floor(Date.now() / 1000);
              const header  = Buffer.from(JSON.stringify({ alg: 'RS256', typ: 'JWT' })).toString('base64url');
              const payload = Buffer.from(JSON.stringify({ iat: now - 60, exp: now + 600, iss: appId })).toString('base64url');
              const body    = `${header}.${payload}`;
              const sig     = crypto.createSign('RSA-SHA256').update(body).sign(pem, 'base64url');
              return `${body}.${sig}`;
            }

            async function api(method, path, expectedStatus = 200) {
              return new Promise((resolve, reject) => {
                const req = https.request({
                  hostname: 'api.github.com',
                  path,
                  method,
                  headers: {
                    Authorization:          `Bearer ${makeJWT()}`,
                    Accept:                 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'User-Agent':           'portfolio-key-rotation',
                    'Content-Length':       0,
                  },
                }, res => {
                  let body = '';
                  res.on('data', c => body += c);
                  res.on('end', () => {
                    if (res.statusCode !== expectedStatus) {
                      reject(new Error(`${method} ${path} → ${res.statusCode}: ${body}`));
                    } else {
                      resolve(body ? JSON.parse(body) : null);
                    }
                  });
                });
                req.on('error', reject);
                req.end();
              });
            }

            const keys = await api('GET', '/app/keys');
            for (const key of keys) {
              if (key.id === keepId) continue;
              await api('DELETE', `/app/keys/${key.id}`, 204);
              console.log(`Deleted old key id=${key.id}`);
            }
            console.log(`Done — only key id=${keepId} remains`);
          EOF
